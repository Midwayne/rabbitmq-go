version: '2'

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

formatters:
  settings:
    goimports:
      local-prefixes:
        - github.com/Midwayne/rabbitmq-go
    golines:
      max-len: 128
      tab-len: 4

linters:
  enable:
    - errcheck
    - staticcheck
    - unused
    - govet
    - gosec
    - gocritic
    - mnd
    - gocognit
    - gocyclo
    - makezero
    - prealloc
    - whitespace
    - modernize
    - unparam
    - goconst
    - lll
  settings:
    lll:
      line-length: 128
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - mnd
          - gocognit
          - gocyclo
          - goconst
          - gosec
